<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RCEES Facilities · UENR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fa;--bg2:#eaecf2;--card:#fff;--card2:#f8f9fc;
  --ink:#111827;--ink2:#4b5563;--ink3:#6b7280;--ink4:#9ca3af;
  --pri:#1e40af;--pri2:#2563eb;--priP:#dbeafe;--priD:#1e3a8a;
  --ok:#047857;--okP:#d1fae5;
  --warn:#b45309;--warnP:#fef3c7;
  --err:#b91c1c;--errP:#fee2e2;
  --brd:#e5e7eb;--brd2:#d1d5db;
  --sh1:0 1px 2px rgba(0,0,0,.05);--sh2:0 4px 12px rgba(0,0,0,.07);--sh3:0 12px 32px rgba(0,0,0,.1);
  --r1:8px;--r2:12px;--r3:16px;
  --fh:'Playfair Display',Georgia,serif;--fb:'Plus Jakarta Sans',-apple-system,sans-serif;
}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:14px}
h1,h2,h3{font-family:var(--fh);font-weight:600;line-height:1.2}
button{cursor:pointer;font-family:var(--fb);border:none;font-size:13px}
input,select,textarea{font-family:var(--fb);font-size:13.5px}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}

.app{display:flex;min-height:100vh}
.side{width:250px;background:#0f172a;color:#cbd5e1;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.mn{flex:1;margin-left:250px}
.top{height:56px;background:rgba(244,246,250,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50}
.top h1{font-size:16px;font-family:var(--fb);font-weight:700}.top .sp{flex:1}
.pg{padding:24px;max-width:1400px}

.s-hd{padding:18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.s-ic{width:38px;height:38px;background:var(--pri);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-family:var(--fh);font-size:16px}
.s-hd h2{font-size:14px;font-weight:700;font-family:var(--fb);color:#f1f5f9}.s-hd small{font-size:9px;opacity:.35;display:block;letter-spacing:.5px;text-transform:uppercase}
.s-nav{flex:1;padding:12px 8px}
.s-lb{font-size:9px;text-transform:uppercase;letter-spacing:2px;opacity:.25;padding:0 12px;margin:18px 0 6px;font-weight:700}
.s-i{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r1);font-size:13px;color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s;margin-bottom:1px}
.s-i:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.s-i.on{background:rgba(30,64,175,.5);color:#93c5fd;font-weight:600}
.s-i .ic{width:18px;text-align:center;font-size:14px}
.s-i .bdg{margin-left:auto;background:#f59e0b;color:#000;font-size:9px;padding:1px 7px;border-radius:8px;font-weight:700}
.s-ft{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06)}

.crd{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:20px;box-shadow:var(--sh1)}
.crd:hover{box-shadow:var(--sh2)}
.crd-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.crd-h h3{font-size:15px;font-family:var(--fb);font-weight:700}

.g{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4,.g3{grid-template-columns:1fr 1fr}}@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}}

.st{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--pri)}
.st.sg::before{background:var(--ok)}.st.sr::before{background:var(--err)}.st.sw::before{background:var(--warn)}
.st-l{font-size:10.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:2px}
.st-v{font-family:var(--fh);font-size:26px;font-weight:700}

.bt{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r1);font-weight:600;transition:all .15s;border:1px solid transparent}
.bt-p{background:var(--pri);color:#fff}.bt-p:hover{background:var(--pri2)}
.bt-s{background:var(--bg2);color:var(--ink);border-color:var(--brd)}.bt-s:hover{border-color:var(--brd2)}
.bt-d{background:var(--err);color:#fff}
.bt-g{background:transparent;color:var(--ink3)}.bt-g:hover{background:var(--bg2)}
.bt-ok{background:var(--ok);color:#fff}
.bt-sm{padding:5px 11px;font-size:12px}.bt-lg{padding:12px 24px;font-size:14px}
.bt:disabled{opacity:.35;cursor:not-allowed}

.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.fi{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:var(--r1);background:var(--card);transition:all .15s}
.fi:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(30,64,175,.1)}
textarea.fi{min-height:60px;resize:vertical}

.tg{display:inline-flex;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.t-ok{background:var(--okP);color:var(--ok)}.t-w{background:var(--warnP);color:var(--warn)}
.t-err{background:var(--errP);color:var(--err)}.t-p{background:var(--priP);color:var(--pri)}
.t-n{background:var(--bg2);color:var(--ink3)}

.tw{overflow-x:auto;border-radius:var(--r1)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;border-bottom:2px solid var(--brd);background:var(--card2)}
td{padding:10px 12px;border-bottom:1px solid var(--brd)}
tr:hover td{background:var(--card2)}

.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.mo{background:var(--card);border-radius:var(--r3);max-width:620px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--sh3)}
.mo-h{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.mo-h h3{font-size:16px;font-family:var(--fb);font-weight:700}
.mo-b{padding:20px}.mo-f{padding:12px 20px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:8px}

.fc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .2s}
.fc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.fc-im{height:155px;background:linear-gradient(135deg,var(--priP),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;background-size:cover;background-position:center}
.fc-im .fc-ct{position:absolute;top:10px;left:10px;background:rgba(15,23,42,.6);color:#fff;padding:2px 9px;border-radius:14px;font-size:10px;font-weight:600;backdrop-filter:blur(6px)}
.fc-im .fc-rt{position:absolute;top:10px;right:10px;background:rgba(15,23,42,.6);color:#fbbf24;padding:2px 9px;border-radius:14px;font-size:10px;backdrop-filter:blur(6px)}
.fc-bd{padding:14px}.fc-nm{font-size:15px;font-weight:700;margin-bottom:2px}
.fc-ds{font-size:11.5px;color:var(--ink3);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fc-mt{display:flex;gap:10px;font-size:11.5px;color:var(--ink3)}
.fc-pr{margin-top:10px;font-size:18px;font-weight:700;color:var(--pri);font-family:var(--fh)}
.fc-pr small{font-size:11px;font-weight:400;color:var(--ink4);font-family:var(--fb)}

.sl-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:4px}
.sl{padding:7px;border-radius:var(--r1);text-align:center;font-size:12px;font-weight:600;border:1px solid var(--brd);cursor:pointer;transition:all .12s}
.sl.av{background:var(--priP);border-color:rgba(30,64,175,.15);color:var(--pri)}.sl.av:hover{background:var(--pri);color:#fff}
.sl.bk{background:var(--bg2);color:var(--ink4);cursor:not-allowed;text-decoration:line-through}
.sl.sel{background:var(--pri);color:#fff;border-color:var(--pri)}
.sl.mnt{background:var(--warnP);color:var(--warn);cursor:not-allowed}

.cl-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cl-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cl-dh{font-size:9px;color:var(--ink4);font-weight:700;padding:4px;text-transform:uppercase}
.cl-d{padding:6px 2px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .12s;font-weight:500}
.cl-d:hover{background:var(--priP)}.cl-d.tod{background:var(--pri);color:#fff;font-weight:700}
.cl-d.csel{background:var(--pri2);color:#fff}.cl-d.emp{visibility:hidden}.cl-d.past{opacity:.25;cursor:default}

.pb{border:2px solid var(--pri);border-radius:var(--r2);padding:18px}
.pln{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
.pln.ptot{font-size:18px;font-weight:700;padding-top:8px;border-top:2px solid var(--brd);margin-top:6px;font-family:var(--fh)}
.pm-g{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.pm{border:2px solid var(--brd);border-radius:var(--r2);padding:12px;text-align:center;cursor:pointer;transition:all .12s;font-size:12px;font-weight:600}
.pm:hover{border-color:var(--pri2)}.pm.psel{border-color:var(--pri);background:var(--priP)}
.pm-ic{font-size:18px;margin-bottom:2px}

.ts-c{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:5px}
.ts{padding:11px 16px;border-radius:var(--r2);font-size:13px;color:#fff;min-width:240px;box-shadow:var(--sh3);animation:tsIn .25s ease;font-weight:500}
.ts-ok{background:var(--ok)}.ts-err{background:var(--err)}.ts-inf{background:var(--pri)}
@keyframes tsIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.hero{min-height:88vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#fff;text-align:center;padding:60px 20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(30,64,175,.3),transparent 55%),radial-gradient(ellipse at 70% 30%,rgba(96,165,250,.1),transparent 45%)}
.hero>div{position:relative;z-index:1;max-width:620px}
.hero h1{font-size:46px;letter-spacing:-1px;margin-bottom:16px}
.hero p{font-size:15px;opacity:.6;line-height:1.75;margin-bottom:32px}
.hero .bt{padding:13px 28px;font-size:14px;border-radius:var(--r2)}
.hero .bt-w{background:#fff;color:var(--pri)}.hero .bt-o{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:#fff}.hero .bt-o:hover{border-color:rgba(255,255,255,.4)}

.sec{padding:56px 24px;max-width:1100px;margin:0 auto}
.sec h2{font-size:30px;text-align:center;margin-bottom:8px}
.sec .sub{text-align:center;color:var(--ink3);margin-bottom:36px;font-size:13px}
.feat{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:800px){.feat{grid-template-columns:1fr}.hero h1{font-size:28px}}
.feat-i{padding:22px;border-radius:var(--r2);border:1px solid var(--brd);background:var(--card)}
.feat-i .fic{font-size:24px;margin-bottom:8px;display:inline-block;padding:8px;background:var(--priP);border-radius:10px}
.feat-i h4{font-size:14px;font-family:var(--fb);font-weight:700;margin-bottom:4px}
.feat-i p{font-size:12px;color:var(--ink3);line-height:1.6}

.am-l{display:flex;flex-wrap:wrap;gap:4px}.am{background:var(--bg2);padding:2px 8px;border-radius:5px;font-size:10.5px;color:var(--ink3);font-weight:500}
.inv-b{font-family:monospace;font-weight:700;font-size:12px;color:var(--pri);background:var(--priP);padding:2px 8px;border-radius:5px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fadeIn .3s ease}
.ld{display:flex;align-items:center;justify-content:center;min-height:250px;gap:8px}
.spr{display:inline-block;width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.upill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--bg2);font-size:12px;font-weight:500}
.uav{width:24px;height:24px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--brd);margin-bottom:16px}
.tab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer}
.tab:hover{color:var(--ink)}.tab.on{color:var(--pri);border-color:var(--pri)}
@media(max-width:900px){.side{transform:translateX(-250px)}.mn{margin-left:0!important}}
@media print{.side,.top{display:none}.mn{margin-left:0}}
</style></head><body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,createContext,useContext}=React;
const X=createContext();
const api=async(u,o={})=>{const c={headers:{'Content-Type':'application/json'},...o};if(o.body&&typeof o.body==='object'&&!(o.body instanceof FormData))c.body=JSON.stringify(o.body);else if(o.body instanceof FormData){delete c.headers['Content-Type'];c.body=o.body}const r=await fetch(u,c);if(!r.ok){const e=await r.json().catch(()=>({detail:'Error'}));throw new Error(e.detail||'Error')}return r.json()};
const CI={'Meeting Space':'💼','Event Space':'🏛️','Creative Space':'🎬','Laboratory':'🔬','Dining & Social':'☕','Outdoor Space':'🌳','Seminar Room':'🎓','Lecture Hall':'📚'};
const Toasts=({items,rm})=><div className="ts-c">{items.map(t=><div key={t.id} className={"ts ts-"+t.type} onClick={()=>rm(t.id)}>{t.msg}</div>)}</div>;
const Modal=({open,close,title,children,footer,wide})=>{if(!open)return null;return<div className="mo-bg" onClick={close}><div className="mo" style={wide?{maxWidth:740}:{}} onClick={e=>e.stopPropagation()}><div className="mo-h"><h3>{title}</h3><button className="bt bt-g bt-sm" onClick={close}>✕</button></div><div className="mo-b">{children}</div>{footer&&<div className="mo-f">{footer}</div>}</div></div>};
const Cal=({sel,onSel})=>{const[vd,sv]=useState(new Date());const y=vd.getFullYear(),mo=vd.getMonth();const dim=new Date(y,mo+1,0).getDate(),fd=new Date(y,mo,1).getDay();const today=new Date().toISOString().split('T')[0];const days=[];for(let i=0;i<fd;i++)days.push(null);for(let d=1;d<=dim;d++)days.push(d);return<div><div className="cl-h"><button className="bt bt-g bt-sm" onClick={()=>sv(new Date(y,mo-1))}>←</button><strong style={{fontSize:12}}>{vd.toLocaleDateString('en',{month:'long',year:'numeric'})}</strong><button className="bt bt-g bt-sm" onClick={()=>sv(new Date(y,mo+1))}>→</button></div><div className="cl-g">{['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div key={d} className="cl-dh">{d}</div>)}{days.map((d,i)=>{if(!d)return<div key={"e"+i} className="cl-d emp"/>;const ds=y+"-"+String(mo+1).padStart(2,'0')+"-"+String(d).padStart(2,'0');return<div key={d} className={"cl-d"+(ds===today?" tod":"")+(ds===sel?" csel":"")+(ds<today?" past":"")} onClick={()=>ds>=today&&onSel(ds)}>{d}</div>})}</div></div>};

const Landing=()=>{const{go}=useContext(X);const[facs,sF]=useState([]);useEffect(()=>{api('/api/facilities').then(sF).catch(()=>{})},[]);
return<div>
<div className="hero"><div>
<div style={{fontSize:10,letterSpacing:4,textTransform:'uppercase',opacity:.3,marginBottom:14,fontWeight:700}}>Regional Centre for Energy & Environmental Sustainability · UENR</div>
<h1>Book Research-Grade Facilities</h1>
<p>Reserve conference rooms, laboratories, lecture halls, studios and event spaces at UENR's premier research centre — in minutes, not phone calls.</p>
<div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}><button className="bt bt-w" onClick={()=>go('browse')}>🔍 Browse Facilities</button><button className="bt bt-o" onClick={()=>go('guest')}>📅 Quick Book</button></div>
<div style={{marginTop:16,display:'flex',gap:8,justifyContent:'center'}}><button className="bt bt-g" style={{color:'rgba(255,255,255,.4)'}} onClick={()=>go('login')}>Staff Login →</button><button className="bt bt-g" style={{color:'rgba(255,255,255,.4)'}} onClick={()=>go('register')}>Create Account →</button></div>
</div></div>
<div className="sec"><h2>Why RCEES?</h2><p className="sub">State-of-the-art spaces for research, innovation & collaboration</p>
<div className="feat">{[{i:'🔬',t:'4 Specialized Labs',d:'Renewable Energy, Environmental Monitoring, Bioenergy, Energy Systems.'},{i:'⚡',t:'Real-Time Slots',d:'See availability instantly. Confirmed in seconds.'},{i:'💰',t:'Transparent Pricing',d:'Hourly, half-day & full-day rates. Discount codes available.'},{i:'🔧',t:'Always Maintained',d:'Scheduled maintenance ensures peak condition.'},{i:'📱',t:'MoMo + Cards',d:'MTN MoMo, Vodafone Cash, AirtelTigo, bank cards.'},{i:'🧾',t:'Auto Invoices',d:'Professional invoices & receipts generated automatically.'}].map((f,i)=><div key={i} className="feat-i"><div className="fic">{f.i}</div><h4>{f.t}</h4><p>{f.d}</p></div>)}</div></div>
<div style={{background:'var(--bg2)',padding:'50px 0'}}><div className="sec" style={{padding:'0 24px'}}><h2>Our Facilities</h2><p className="sub">{facs.length} spaces ready for your next event</p>
<div className="g g4">{facs.slice(0,8).map(f=>{const m=JSON.parse(f.media||'[]');return<div key={f.id} className="fc" onClick={()=>{window.__fid=f.id;go('detail')}}><div className="fc-im" style={m.length?{backgroundImage:'url('+m[0].url+')'}:{}}>{!m.length&&<span>{CI[f.cat_name]||'🏢'}</span>}<span className="fc-ct">{f.cat_name}</span>{f.avg_rating>0&&<span className="fc-rt">★ {f.avg_rating.toFixed(1)}</span>}</div><div className="fc-bd"><div className="fc-nm">{f.name}</div><div className="fc-ds">{f.short_desc}</div><div className="fc-mt"><span>👥 {f.capacity}</span><span>📍 {f.building}</span></div><div className="fc-pr">GH₵{f.hourly_rate}<small>/hr</small></div></div></div>})}</div>
{facs.length>8&&<div style={{textAlign:'center',marginTop:20}}><button className="bt bt-p bt-lg" onClick={()=>go('browse')}>View All {facs.length} →</button></div>}
</div></div>
<div style={{background:'#0f172a',color:'#fff',padding:'28px',textAlign:'center'}}><p style={{opacity:.3,fontSize:11}}>RCEES Facilities · UENR · Sunyani, Ghana · © {new Date().getFullYear()}</p></div>
</div>};

const Login=()=>{const{go,login,toast}=useContext(X);const[e,sE]=useState('');const[p,sP]=useState('');const[ld,sL]=useState(false);const sub=async ev=>{ev.preventDefault();sL(true);try{const d=await api('/api/auth/login',{method:'POST',body:{email:e,password:p}});login(d.user,d.token);toast('Welcome back!','ok');go(d.user.role==='admin'?'a-dash':'u-dash')}catch(err){toast(err.message,'err')}sL(false)};return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f172a'}}><div className="crd anim" style={{width:380,padding:32}}><div style={{textAlign:'center',marginBottom:24}}><div className="s-ic" style={{margin:'0 auto 12px',width:48,height:48,fontSize:20}}>R</div><h2 style={{fontSize:22}}>Welcome Back</h2><p style={{color:'var(--ink3)',fontSize:12}}>Sign in to RCEES Facilities</p></div><form onSubmit={sub}><div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={e} onChange={ev=>sE(ev.target.value)} required/></div><div className="fg"><label className="fl">Password</label><input className="fi" type="password" value={p} onChange={ev=>sP(ev.target.value)} required/></div><button className="bt bt-p" type="submit" disabled={ld} style={{width:'100%',justifyContent:'center'}}>{ld?<span className="spr"/>:'Sign In'}</button></form><div style={{textAlign:'center',marginTop:16,fontSize:12,color:'var(--ink3)'}}>No account? <a style={{color:'var(--pri)',cursor:'pointer',fontWeight:600}} onClick={()=>go('register')}>Register</a><br/><a style={{color:'var(--ink4)',cursor:'pointer'}} onClick={()=>go('landing')}>← Home</a></div></div></div>};
const Register=()=>{const{go,login,toast}=useContext(X);const[f,sF]=useState({name:'',email:'',password:'',phone:'',organization:''});const[ld,sL]=useState(false);const sub=async ev=>{ev.preventDefault();sL(true);try{const d=await api('/api/auth/register',{method:'POST',body:f});login(d.user,d.token);toast('Account created!','ok');go('u-dash')}catch(err){toast(err.message,'err')}sL(false)};return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0f172a'}}><div className="crd anim" style={{width:420,padding:32}}><div style={{textAlign:'center',marginBottom:20}}><h2 style={{fontSize:22}}>Create Account</h2></div><form onSubmit={sub}><div className="fg"><label className="fl">Full Name</label><input className="fi" value={f.name} onChange={e=>sF({...f,name:e.target.value})} required/></div><div className="fg"><label className="fl">Email</label><input className="fi" type="email" value={f.email} onChange={e=>sF({...f,email:e.target.value})} required/></div><div className="fg"><label className="fl">Password</label><input className="fi" type="password" value={f.password} onChange={e=>sF({...f,password:e.target.value})} required/></div><div className="g g2"><div className="fg"><label className="fl">Phone</label><input className="fi" value={f.phone} onChange={e=>sF({...f,phone:e.target.value})}/></div><div className="fg"><label className="fl">Organization</label><input className="fi" value={f.organization} onChange={e=>sF({...f,organization:e.target.value})}/></div></div><button className="bt bt-p" type="submit" disabled={ld} style={{width:'100%',justifyContent:'center'}}>{ld?<span className="spr"/>:'Create Account'}</button></form><div style={{textAlign:'center',marginTop:12,fontSize:12,color:'var(--ink3)'}}>Have account? <a style={{color:'var(--pri)',cursor:'pointer'}} onClick={()=>go('login')}>Sign in</a> · <a style={{color:'var(--ink4)',cursor:'pointer'}} onClick={()=>go('landing')}>Home</a></div></div></div>};

const Browse=()=>{const{go}=useContext(X);const[facs,sF]=useState([]);const[cats,sC]=useState([]);const[q,sQ]=useState('');const[cat,sCat]=useState('');const[ld,sL]=useState(true);useEffect(()=>{api('/api/facilities').then(f=>{sF(f);sL(false)});api('/api/categories').then(sC)},[]);const fl=facs.filter(f=>(f.name+' '+(f.building||'')).toLowerCase().includes(q.toLowerCase())&&(!cat||f.category_id===cat));return<div style={{maxWidth:1200,margin:'0 auto',padding:'24px 20px'}}><button className="bt bt-g bt-sm" onClick={()=>go('landing')}>← Home</button><div style={{margin:'8px 0 20px'}}><h1 style={{fontSize:26}}>Browse Facilities</h1><p style={{color:'var(--ink3)',fontSize:13}}>{facs.length} spaces at RCEES</p></div><div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}><input className="fi" style={{maxWidth:250}} placeholder="Search..." value={q} onChange={e=>sQ(e.target.value)}/><select className="fi" style={{maxWidth:180}} value={cat} onChange={e=>sCat(e.target.value)}><option value="">All Categories</option>{cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}</select></div>{ld?<div className="ld"><div className="spr"/></div>:<div className="g g3">{fl.map(f=>{const m=JSON.parse(f.media||'[]');return<div key={f.id} className="fc" onClick={()=>{window.__fid=f.id;go('detail')}}><div className="fc-im" style={m.length?{backgroundImage:'url('+m[0].url+')'}:{}}>{!m.length&&<span>{CI[f.cat_name]||'🏢'}</span>}<span className="fc-ct">{f.cat_name}</span></div><div className="fc-bd"><div className="fc-nm">{f.name}</div><div className="fc-ds">{f.short_desc}</div><div className="fc-mt"><span>👥 {f.capacity}</span><span>📍 {f.building}</span></div><div style={{marginTop:6}}><div className="am-l">{JSON.parse(f.amenities||'[]').slice(0,3).map((a,i)=><span key={i} className="am">{a}</span>)}</div></div><div className="fc-pr">GH₵{f.hourly_rate}<small>/hr</small> <span style={{fontSize:11,color:'var(--ink4)',marginLeft:6}}>Half: GH₵{f.half_day_rate}</span></div></div></div>})}</div>}</div>};

const Detail=()=>{const{go,user,toast}=useContext(X);const[fac,sF]=useState(null);const[dt,sDt]=useState(new Date().toISOString().split('T')[0]);const[sd,sSD]=useState(null);const[ss,sSS]=useState([]);const[eq,sEq]=useState([]);const[se,sSE]=useState([]);const[step,sSt]=useState(1);const[res,sRes]=useState(null);const[fm,sFm]=useState({title:'',guest_name:'',guest_email:'',guest_phone:'',guest_org:'',attendees:1,special_req:'',discount_code:'',event_type:'general'});const[pm,sPm]=useState('');const[di,sDi]=useState(null);const[ld,sL]=useState(true);const fid=window.__fid;
useEffect(()=>{if(fid){api('/api/facilities/'+fid).then(f=>{sF(f);sL(false)});api('/api/equipment').then(sEq)}},[fid]);
useEffect(()=>{if(fid&&dt){api('/api/facilities/'+fid+'/slots?date='+dt).then(sSD);sSS([])}},[fid,dt]);
const tog=s=>{if(!s.available)return;const ex=ss.find(x=>x.start===s.start);if(ex)sSS(ss.filter(x=>x.start!==s.start));else sSS([...ss,s].sort((a,b)=>a.start.localeCompare(b.start)))};
const con=ss.length<=1||ss.every((s,i)=>i===0||s.start===ss[i-1].end);const hrs=ss.length;
const bp=useMemo(()=>{if(!fac||hrs===0)return 0;const r=sd?.is_weekend?fac.hourly_rate*fac.weekend_multiplier:fac.hourly_rate;if(hrs>=8&&fac.full_day_rate>0){let p=fac.full_day_rate;if(sd?.is_weekend)p*=fac.weekend_multiplier;return p}if(hrs>=4&&fac.half_day_rate>0){let p=fac.half_day_rate;if(sd?.is_weekend)p*=fac.weekend_multiplier;if(hrs>4)p+=(hrs-4)*r;return p}return hrs*r},[fac,hrs,sd]);
const ec=se.reduce((s,eid)=>{const e=eq.find(x=>x.id===eid);return s+(e?e.hourly_rate*hrs:0)},0);const sub=bp+ec;
const da=di?.valid?(di.discount.dtype==='percentage'?sub*(di.discount.value/100):Math.min(di.discount.value,sub)):0;
const cd=di?.valid&&di.discount.max_discount>0?Math.min(da,di.discount.max_discount):da;const tot=Math.max(0,sub-cd);
const vDisc=async()=>{if(!fm.discount_code)return;try{const r=await api('/api/discounts/validate',{method:'POST',body:{code:fm.discount_code,hours:hrs,amount:sub}});sDi(r);toast(r.valid?'Discount applied!':r.message,r.valid?'ok':'err')}catch(e){toast('Invalid code','err')}};
const book=async()=>{if(!con){toast('Select contiguous slots','err');return}try{const bd={facility_id:fid,title:fm.title,event_type:fm.event_type,booking_date:dt,start_time:ss[0].start,end_time:ss[ss.length-1].end,attendees:fm.attendees,special_req:fm.special_req,discount_code:fm.discount_code,equipment:se,pay_method:pm};if(user)bd.user_id=user.id;else{bd.guest_name=fm.guest_name;bd.guest_email=fm.guest_email;bd.guest_phone=fm.guest_phone;bd.guest_org=fm.guest_org}const r=await api('/api/bookings',{method:'POST',body:bd});sRes(r);sSt(4);toast('Booking submitted!','ok')}catch(err){toast(err.message,'err')}};
if(ld)return<div className="ld"><div className="spr"/></div>;if(!fac)return<div className="ld">Not found</div>;
const media=JSON.parse(fac.media||'[]');const amen=JSON.parse(fac.amenities||'[]');const slots=sd?.slots||[];
return<div style={{maxWidth:1100,margin:'0 auto',padding:'24px 20px'}}><button className="bt bt-g bt-sm" onClick={()=>go('browse')} style={{marginBottom:12}}>← Back</button>
<div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:24,alignItems:'start'}}>
<div className="anim">
<div style={{height:260,borderRadius:'var(--r3)',overflow:'hidden',marginBottom:16,background:'linear-gradient(135deg,var(--priP),var(--bg2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:56,backgroundSize:'cover',backgroundPosition:'center',...(media.length?{backgroundImage:'url('+media[0].url+')'}:{})}}>{!media.length&&(CI[fac.cat_name]||'🏢')}</div>
<h1 style={{fontSize:26,marginBottom:4}}>{fac.name}</h1>
<div style={{display:'flex',gap:12,color:'var(--ink3)',fontSize:12,marginBottom:12,flexWrap:'wrap'}}><span>📍 {fac.location}</span><span>👥 {fac.capacity}</span><span>🏷️ {fac.cat_name}</span></div>
<p style={{color:'var(--ink2)',lineHeight:1.7,marginBottom:16,fontSize:13}}>{fac.description}</p>
<div className="am-l" style={{marginBottom:16}}>{amen.map((a,i)=><span key={i} className="am" style={{padding:'3px 10px'}}>{a}</span>)}</div>
<div className="g g3" style={{marginBottom:16}}>
<div className="st"><div className="st-l">Hourly</div><div className="st-v" style={{fontSize:18}}>GH₵{fac.hourly_rate}</div></div>
<div className="st sw"><div className="st-l">Half-Day</div><div className="st-v" style={{fontSize:18}}>GH₵{fac.half_day_rate}</div></div>
<div className="st sg"><div className="st-l">Full-Day</div><div className="st-v" style={{fontSize:18}}>GH₵{fac.full_day_rate}</div></div>
</div></div>

<div className="crd anim" style={{position:'sticky',top:68}}>
{step===1&&<><h3 style={{fontSize:14,marginBottom:10,fontFamily:'var(--fb)',fontWeight:700}}>📅 Select Date & Time</h3><Cal sel={dt} onSel={sDt}/><div style={{margin:'10px 0 6px',fontSize:11,color:'var(--ink3)'}}>Slots for <strong>{new Date(dt+'T12:00').toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'})}</strong>:</div><div className="sl-g">{slots.map(s=><div key={s.start} className={"sl "+(s.available?(ss.find(x=>x.start===s.start)?'sel':'av'):s.status==='maintenance'?'mnt':'bk')} onClick={()=>tog(s)}>{s.start}<div style={{fontSize:9,opacity:.6}}>GH₵{s.rate}</div></div>)}</div>{ss.length>0&&!con&&<p style={{color:'var(--err)',fontSize:10,marginTop:4}}>⚠ Select contiguous slots</p>}{ss.length>0&&con&&<div style={{marginTop:10,padding:8,background:'var(--priP)',borderRadius:'var(--r1)',fontSize:12}}><strong>{hrs}hr{hrs>1?'s':''}</strong>: {ss[0]?.start}–{ss[ss.length-1]?.end}<div style={{fontWeight:700,fontSize:16,color:'var(--pri)',marginTop:2,fontFamily:'var(--fh)'}}>GH₵{bp.toFixed(2)}</div></div>}<button className="bt bt-p" style={{width:'100%',justifyContent:'center',marginTop:10}} disabled={!ss.length||!con} onClick={()=>sSt(2)}>Continue →</button></>}

{step===2&&<><div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}><button className="bt bt-g bt-sm" onClick={()=>sSt(1)}>←</button><h3 style={{fontSize:14,fontFamily:'var(--fb)',fontWeight:700}}>Details</h3></div><div className="fg"><label className="fl">Event Title *</label><input className="fi" value={fm.title} onChange={e=>sFm({...fm,title:e.target.value})}/></div><div className="g g2"><div className="fg"><label className="fl">Type</label><select className="fi" value={fm.event_type} onChange={e=>sFm({...fm,event_type:e.target.value})}>{['general','meeting','lecture','workshop','seminar','conference','research','exam'].map(t=><option key={t}>{t}</option>)}</select></div><div className="fg"><label className="fl">Attendees</label><input className="fi" type="number" min={1} max={fac.capacity} value={fm.attendees} onChange={e=>sFm({...fm,attendees:parseInt(e.target.value)||1})}/></div></div>{!user&&<><p style={{fontSize:11,color:'var(--pri)',fontWeight:700,margin:'6px 0'}}>👤 Your Details (for notifications)</p><div className="fg"><label className="fl">Name *</label><input className="fi" value={fm.guest_name} onChange={e=>sFm({...fm,guest_name:e.target.value})}/></div><div className="g g2"><div className="fg"><label className="fl">Email *</label><input className="fi" type="email" value={fm.guest_email} onChange={e=>sFm({...fm,guest_email:e.target.value})}/></div><div className="fg"><label className="fl">Phone</label><input className="fi" value={fm.guest_phone} onChange={e=>sFm({...fm,guest_phone:e.target.value})}/></div></div></>}<button className="bt bt-p" style={{width:'100%',justifyContent:'center'}} disabled={!fm.title||(!user&&(!fm.guest_name||!fm.guest_email))} onClick={()=>sSt(3)}>Review →</button></>}

{step===3&&<><div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}><button className="bt bt-g bt-sm" onClick={()=>sSt(2)}>←</button><h3 style={{fontSize:14,fontFamily:'var(--fb)',fontWeight:700}}>Review & Submit</h3></div><div className="pb"><div style={{marginBottom:8,fontSize:11,color:'var(--ink3)'}}><strong>{fac.name}</strong><br/>{new Date(dt+'T12:00').toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric',year:'numeric'})} · {ss[0]?.start}–{ss[ss.length-1]?.end}</div><div className="pln"><span>Facility ({hrs}hr{hrs>1?'s':''})</span><span>GH₵{bp.toFixed(2)}</span></div>{ec>0&&<div className="pln"><span>Equipment</span><span>GH₵{ec.toFixed(2)}</span></div>}{cd>0&&<div className="pln" style={{color:'var(--ok)'}}><span>Discount</span><span>−GH₵{cd.toFixed(2)}</span></div>}<div className="pln ptot"><span>Total</span><span style={{color:'var(--pri)'}}>GH₵{tot.toFixed(2)}</span></div></div><div className="fg" style={{marginTop:10}}><label className="fl">Discount Code</label><div style={{display:'flex',gap:4}}><input className="fi" value={fm.discount_code} onChange={e=>sFm({...fm,discount_code:e.target.value})} placeholder="RCEES10" style={{flex:1}}/><button className="bt bt-s bt-sm" onClick={vDisc}>Apply</button></div></div>{fac.requires_approval?<div style={{background:'var(--warnP)',padding:'8px 12px',borderRadius:'var(--r1)',fontSize:11,color:'var(--warn)',marginBottom:8}}>📋 Requires admin approval. You'll get an email with a payment link once approved.</div>:<div style={{background:'var(--priP)',padding:'8px 12px',borderRadius:'var(--r1)',fontSize:11,color:'var(--pri)',marginBottom:8}}>✅ Auto-confirmed. An invoice will be generated automatically.</div>}<button className="bt bt-p bt-lg" style={{width:'100%',justifyContent:'center'}} onClick={book}>Submit Booking</button></>}

{step===4&&res&&<div style={{textAlign:'center'}}><div style={{fontSize:44,marginBottom:8}}>{res.status==='confirmed'?'✅':'📨'}</div><h3 style={{fontSize:17,marginBottom:4}}>{res.status==='confirmed'?'Confirmed!':'Submitted for Approval'}</h3><p style={{fontSize:11,color:'var(--ink3)',marginBottom:12}}>{res.status==='confirmed'?'Your booking is confirmed.':'You'll receive an email once approved.'}</p><div className="crd" style={{background:'var(--card2)',textAlign:'left',fontSize:12,padding:12,marginBottom:12}}><div style={{marginBottom:3}}><strong>Ref:</strong> <span className="inv-b">{res.ref}</span></div><div style={{marginBottom:3}}><strong>Date:</strong> {res.booking_date} · {res.start_time}–{res.end_time}</div><div style={{marginBottom:3}}><strong>Status:</strong> <span className={"tg "+(res.status==='confirmed'?'t-ok':'t-w')}>{res.status}</span></div><div><strong>Amount:</strong> GH₵{res.final_amount?.toFixed(2)}</div></div><div style={{display:'flex',gap:6,justifyContent:'center'}}><button className="bt bt-p" onClick={()=>{sSt(1);sSS([]);sRes(null);sDi(null)}}>Book Another</button><button className="bt bt-s" onClick={()=>go(user?'u-dash':'landing')}>{user?'Dashboard':'Home'}</button></div></div>}

const Guest=()=>{const{go}=useContext(X);const[facs,sF]=useState([]);const[q,sQ]=useState('');const[lr,sLR]=useState(null);useEffect(()=>{api('/api/facilities').then(sF)},[]);const lu=async()=>{if(!q)return;if(q.includes('@'))sLR({t:'l',d:await api('/api/bookings/guest/'+encodeURIComponent(q))});else{try{sLR({t:'s',d:await api('/api/bookings/ref/'+q)})}catch(e){sLR({t:'l',d:[]})}}};return<div style={{maxWidth:900,margin:'0 auto',padding:'32px 20px'}}><button className="bt bt-g bt-sm" onClick={()=>go('landing')}>← Home</button><h1 style={{fontSize:26,marginTop:8,marginBottom:4}}>Quick Guest Booking</h1><p style={{color:'var(--ink3)',fontSize:12,marginBottom:20}}>No account needed.</p><div className="crd" style={{marginBottom:18}}><h3 style={{marginBottom:8,fontSize:14,fontFamily:'var(--fb)',fontWeight:700}}>🔍 Look up booking</h3><div style={{display:'flex',gap:6}}><input className="fi" placeholder="Email or reference (RCEES-XXXXX)" value={q} onChange={e=>sQ(e.target.value)} style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&lu()}/><button className="bt bt-s" onClick={lu}>Find</button></div>{lr&&<div style={{marginTop:10}}>{lr.t==='s'?<div className="crd" style={{background:'var(--card2)',padding:12,fontSize:12}}><strong>{lr.d.ref}</strong> — {lr.d.fac_name} · {lr.d.booking_date} · <span className={"tg "+(lr.d.status==='confirmed'?'t-ok':'t-w')}>{lr.d.status}</span> <span className={"tg "+(lr.d.pay_status==='paid'?'t-ok':'t-w')}>{lr.d.pay_status}</span></div>:lr.d.length===0?<p style={{fontSize:12,color:'var(--ink3)',marginTop:6}}>No bookings found.</p>:<div className="tw"><table><thead><tr><th>Ref</th><th>Facility</th><th>Date</th><th>Status</th><th>Payment</th></tr></thead><tbody>{lr.d.map(b=><tr key={b.id}><td style={{fontFamily:'monospace',fontWeight:700}}>{b.ref}</td><td>{b.fac_name}</td><td>{b.booking_date}</td><td><span className={"tg "+(b.status==='confirmed'?'t-ok':'t-w')}>{b.status}</span></td><td><span className={"tg "+(b.pay_status==='paid'?'t-ok':'t-w')}>{b. a} ✕</span>)}</div></div><label style={{fontSize:12,cursor:'pointer'}}><input type="checkbox" checked={fm.requires_approval} onChange={e=>sFm({...fm,requires_approval:e.target.checked?1:0})}/> Require approval</label></Modal></div>};

const AMt=()=>{const{toast}=useContext(X);const[items,sI]=useState([]);const[facs,sF]=useState([]);const[show,sS]=useState(false);const[ld,sL]=useState(true);const[fm,sFm]=useState({facility_id:'',title:'',mtype:'routine',priority:'medium',start_date:'',end_date:'',cost_est:0,blocks_bookings:1});useEffect(()=>{api('/api/maintenance').then(m=>{sI(m);sL(false)});api('/api/facilities?active_only=false').then(sF)},[]);const add=async()=>{try{await api('/api/maintenance',{method:'POST',body:fm});toast('Scheduled!','ok');sS(false);api('/api/maintenance').then(sI)}catch(e){toast(e.message,'err')}};const upd=async(id,st)=>{await api('/api/maintenance/'+id,{method:'PUT',body:{status:st}});api('/api/maintenance').then(sI)};return<div className="anim"><div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}><h1 style={{fontSize:20}}>Maintenance</h1><button className="bt bt-p" onClick={()=>sS(true)}>+ Schedule</button></div>{ld?<div className="ld"><div className="spr"/></div>:<div className="crd"><div className="tw"><table><thead><tr><th>Facility</th><th>Title</th><th>Type</th><th>Priority</th><th>Dates</th><th>Status</th><th>Actions</th></tr></thead><tbody>{items.map(m=><tr key={m.id}><td style={{fontWeight:600}}>{m.fac_name}</td><td>{m.title}</td><td><span className="tg t-n">{m.mtype}</span></td><td><span className={"tg "+(m.priority==='high'||m.priority==='critical'?'t-err':'t-w')}>{m.priority}</span></td><td style={{fontSize:11}}>{(m.start_date||'').slice(0,10)} → {(m.end_date||'').slice(0,10)}</td><td><span className={"tg "+(m.status==='completed'?'t-ok':m.status==='in_progress'?'t-w':'t-p')}>{m.status}</span></td><td>{m.status==='scheduled'&&<button className="bt bt-s bt-sm" onClick={()=>upd(m.id,'in_progress')}>Start</button>}{m.status==='in_progress'&&<button className="bt bt-p bt-sm" onClick={()=>upd(m.id,'completed')}>Done</button>}</td></tr>)}</tbody></table></div></div>}<Modal open={show} close={()=>sS(false)} title="Schedule Maintenance" footer={<><button className="bt bt-s" onClick={()=>sS(false)}>Cancel</button><button className="bt bt-p" onClick={add}>Schedule</button></>}><div className="fg"><label className="fl">Facility</label><select className="fi" value={fm.facility_id} onChange={e=>sFm({...fm,facility_id:e.target.value})}><option value="">Select...</option>{facs.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select></div><div className="fg"><label className="fl">Title</label><input className="fi" value={fm.title} onChange={e=>sFm({...fm,title:e.target.value})}/></div><div className="g g2"><div className="fg"><label className="fl">Start</label><input className="fi" type="date" value={fm.start_date} onChange={e=>sFm({...fm,start_date:e.target.value})}/></div><div className="fg"><label className="fl">End</label><input className="fi" type="date" value={fm.end_date} onChange={e=>sFm({...fm,end_date:e.target.value})}/></div></div></Modal></div>};

const ADc=()=>{const{toast}=useContext(X);const[items,sI]=useState([]);const[show,sS]=useState(false);const[fm,sFm]=useState({code:'',name:'',dtype:'percentage',value:0,min_hours:0,max_uses:0});useEffect(()=>{api('/api/discounts').then(sI)},[]);const add=async()=>{try{await api('/api/discounts',{method:'POST',body:fm});toast('Created!','ok');sS(false);api('/api/discounts').then(sI)}catch(e){toast(e.message,'err')}};const tog=async(id,a)=>{await api('/api/discounts/'+id,{method:'PUT',body:{is_active:a?0:1}});api('/api/discounts').then(sI)};return<div className="anim"><div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}><h1 style={{fontSize:20}}>Discounts</h1><button className="bt bt-p" onClick={()=>sS(true)}>+ Create</button></div><div className="crd"><div className="tw"><table><thead><tr><th>Code</th><th>Name</th><th>Value</th><th>Min Hrs</th><th>Uses</th><th>Status</th><th>Actions</th></tr></thead><tbody>{items.map(d=><tr key={d.id}><td><span className="inv-b">{d.code}</span></td><td>{d.name}</td><td>{d.dtype==='percentage'?d.value+'%':'GH₵'+d.value}</td><td>{d.min_hours||'—'}</td><td>{d.times_used}{d.max_uses>0?'/'+d.max_uses:'/∞'}</td><td><span className={"tg "+(d.is_active?'t-ok':'t-err')}>{d.is_active?'On':'Off'}</span></td><td><button className="bt bt-s bt-sm" onClick={()=>tog(d.id,d.is_active)}>{d.is_active?'Disable':'Enable'}</button></td></tr>)}</tbody></table></div></div><Modal open={show} close={()=>sS(false)} title="Create Discount" footer={<><button className="bt bt-s" onClick={()=>sS(false)}>Cancel</button><button className="bt bt-p" onClick={add}>Create</button></>}><div className="g g2"><div className="fg"><label className="fl">Code</label><input className="fi" value={fm.code} onChange={e=>sFm({...fm,code:e.target.value.toUpperCase()})}/></div><div className="fg"><label className="fl">Name</label><input className="fi" value={fm.name} onChange={e=>sFm({...fm,name:e.target.value})}/></div><div className="fg"><label className="fl">Type</label><select className="fi" value={fm.dtype} onChange={e=>sFm({...fm,dtype:e.target.value})}><option value="percentage">%</option><option value="fixed">GH₵</option></select></div><div className="fg"><label className="fl">Value</label><input className="fi" type="number" value={fm.value} onChange={e=>sFm({...fm,value:+e.target.value||0})}/></div></div></Modal></div>};

const AUs=()=>{const{toast}=useContext(X);const[users,sU]=useState([]);const[q,sQ]=useState('');const load=()=>api('/api/users'+(q?'?search='+q:'')).then(sU);useEffect(load,[q]);return<div className="anim"><h1 style={{fontSize:20,marginBottom:14}}>Users</h1><input className="fi" style={{maxWidth:260,marginBottom:12}} placeholder="Search..." value={q} onChange={e=>sQ(e.target.value)}/><div className="crd"><div className="tw"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Org</th><th>Status</th><th>Actions</th></tr></thead><tbody>{users.map(u=><tr key={u.id}><td style={{fontWeight:600}}>{u.name}</td><td style={{fontSize:11}}>{u.email}</td><td><span className={"tg "+(u.role==='admin'?'t-ok':'t-n')}>{u.role}</span></td><td style={{fontSize:11}}>{u.organization||'—'}</td><td><span className={"tg "+(u.is_active?'t-ok':'t-err')}>{u.is_active?'Active':'Off'}</span></td><td><select className="fi" style={{width:75,padding:'2px',fontSize:10}} value={u.role} onChange={async e=>{await api('/api/users/'+u.id,{method:'PUT',body:{role:e.target.value}});toast('Updated','ok');load()}}>{['user','staff','manager','admin'].map(r=><option key={r}>{r}</option>)}</select></td></tr>)}</tbody></table></div></div></div>};

const PayPage=()=>{const{toast}=useContext(X);const[bk,sBk]=useState(null);const[ld,sL]=useState(true);const[pm,sPm]=useState('');const[done,sDone]=useState(false);const tk=window.__payToken||'';useEffect(()=>{if(tk)api('/api/bookings/pay/'+tk).then(b=>{sBk(b);sL(false)}).catch(()=>sL(false))},[]);const pay=async()=>{try{await api('/api/payments/process',{method:'POST',body:{booking_id:bk.id,method:pm}});sDone(true);toast('Payment successful!','ok')}catch(e){toast(e.message,'err')}};if(ld)return<div className="ld"><div className="spr"/></div>;if(!bk)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="crd" style={{maxWidth:380,textAlign:'center',padding:28}}><div style={{fontSize:44}}>❌</div><h2 style={{fontSize:18}}>Invalid Payment Link</h2><p style={{color:'var(--ink3)',fontSize:12}}>This link may have expired.</p></div></div>;if(done)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="crd" style={{maxWidth:400,textAlign:'center',padding:28}}><div style={{fontSize:44}}>✅</div><h2 style={{fontSize:18}}>Payment Complete!</h2><p style={{color:'var(--ink3)',fontSize:12,marginBottom:12}}>Booking <strong>{bk.ref}</strong> is confirmed and paid.</p><a href="/" className="bt bt-p">Back to RCEES</a></div></div>;return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}><div className="crd" style={{maxWidth:440,padding:24}}><div style={{textAlign:'center',marginBottom:16}}><div className="s-ic" style={{margin:'0 auto 8px',width:42,height:42,fontSize:16}}>R</div><h2 style={{fontSize:18}}>Complete Payment</h2><p style={{color:'var(--ink3)',fontSize:11}}>Booking {bk.ref}</p></div><div style={{background:'var(--card2)',padding:12,borderRadius:'var(--r2)',marginBottom:14,fontSize:12}}><div><strong>Facility:</strong> {bk.fac_name}</div><div><strong>Date:</strong> {bk.booking_date} · {bk.start_time}–{bk.end_time}</div><div><strong>Amount:</strong> <span style={{fontSize:18,fontWeight:700,color:'var(--pri)',fontFamily:'var(--fh)'}}>GH₵{bk.final_amount?.toFixed(2)}</span></div></div><div className="fl">Payment Method</div><div className="pm-g">{[{id:'momo',l:'Mobile Money',i:'📱'},{id:'card',l:'Bank Card',i:'💳'},{id:'cash',l:'Office',i:'💵'}].map(p=><div key={p.id} className={"pm"+(pm===p.id?" psel":"")} onClick={()=>sPm(p.id)}><div className="pm-ic">{p.i}</div>{p.l}</div>)}</div><button className="bt bt-p bt-lg" style={{width:'100%',justifyContent:'center',marginTop:6}} disabled={!pm} onClick={pay}>Pay GH₵{bk.final_amount?.toFixed(2)}</button></div></div>};

const Side=({pg,go,user,pend})=>{const isA=user?.role==='admin'||user?.role==='manager';const nav=isA?[{s:'Overview',items:[{id:'a-dash',l:'Dashboard',i:'📊'}]},{s:'Operations',items:[{id:'a-bk',l:'Bookings',i:'📅',b:pend||null},{id:'a-inv',l:'Invoices',i:'🧾'},{id:'a-walk',l:'Walk-in',i:'🚶'},{id:'a-fc',l:'Facilities',i:'🏢'},{id:'a-mt',l:'Maintenance',i:'🔧'},{id:'a-dc',l:'Discounts',i:'🏷️'},{id:'a-us',l:'Users',i:'👥'}]},{s:'Quick',items:[{id:'browse',l:'Browse & Book',i:'🔍'}]}]:[{s:'',items:[{id:'u-dash',l:'My Bookings',i:'📅'},{id:'browse',l:'Browse',i:'🔍'}]}];return<nav className="side"><div className="s-hd"><div className="s-ic">R</div><div><h2>RCEES</h2><small>Facilities</small></div></div><div className="s-nav">{nav.map(sec=><div key={sec.s}>{sec.s&&<div className="s-lb">{sec.s}</div>}{sec.items.map(it=><div key={it.id} className={"s-i"+(pg===it.id?" on":"")} onClick={()=>go(it.id)}><span className="ic">{it.i}</span>{it.l}{it.b&&<span className="bdg">{it.b}</span>}</div>)}</div>)}</div><div className="s-ft"><div className="s-i" onClick={()=>{localStorage.removeItem('rcees_auth');window.location.reload()}}><span className="ic">🚪</span>Sign Out</div></div></nav>};

const App=()=>{const[pg,sPg]=useState('landing');const[user,sU]=useState(null);const[token,sT]=useState(null);const[toasts,sTs]=useState([]);const[pend,sP]=useState(0);
useEffect(()=>{const s=localStorage.getItem('rcees_auth');if(s){try{const o=JSON.parse(s);sU(o.user);sT(o.token);sPg(o.user.role==='admin'||o.user.role==='manager'?'a-dash':'u-dash')}catch(e){}}const h=window.location.hash;if(h.startsWith('#pay/')){window.__payToken=h.replace('#pay/','');sPg('pay-page')}},[]);
useEffect(()=>{if(user?.role==='admin'||user?.role==='manager')api('/api/bookings?status=pending&limit=100').then(d=>sP(d.total||0)).catch(()=>{})},[user,pg]);
const login=(u,t)=>{sU(u);sT(t);localStorage.setItem('rcees_auth',JSON.stringify({user:u,token:t}))};
const toast=(msg,type)=>{const id=Date.now();sTs(p=>[...p,{id,msg,type:type||'inf'}]);setTimeout(()=>sTs(p=>p.filter(t=>t.id!==id)),4000)};
const go=p=>sPg(p);const ctx={pg,go,user,token,login,toast};
const pub=['landing','login','register','browse','detail','guest','pay-page'].includes(pg);const li=!!user;
const titles={'a-dash':'Dashboard','a-bk':'Bookings','a-inv':'Invoices','a-walk':'Walk-in','a-fc':'Facilities','a-mt':'Maintenance','a-dc':'Discounts','a-us':'Users','u-dash':'My Bookings',browse:'Browse'};
const render=()=>{switch(pg){case 'landing':return<Landing/>;case 'login':return<Login/>;case 'register':return<Register/>;case 'browse':return<Browse/>;case 'detail':return<Detail/>;case 'guest':return<Guest/>;case 'u-dash':return<UDash/>;case 'a-dash':return<ADash/>;case 'a-bk':return<ABk/>;case 'a-inv':return<AInv/>;case 'a-walk':return<AWalk/>;case 'a-fc':return<AFc/>;case 'a-mt':return<AMt/>;case 'a-dc':return<ADc/>;case 'a-us':return<AUs/>;case 'pay-page':return<PayPage/>;default:return<Landing/>}};
return<X.Provider value={ctx}><Toasts items={toasts} rm={id=>sTs(toasts.filter(t=>t.id!==id))}/>{pub||!li?render():<div className="app"><Side pg={pg} go={sPg} user={user} pend={pend}/><div className="mn"><div className="top"><h1>{titles[pg]||'RCEES'}</h1><div className="sp"/><div className="upill"><div className="uav">{user.name?.charAt(0)}</div><span>{user.name}</span><span className="tg t-ok" style={{marginLeft:3}}>{user.role}</span></div></div><div className="pg">{render()}</div></div></div>}</X.Provider>};
ReactDOM.render(<App/>,document.getElementById('root'));
</script></body></html>
